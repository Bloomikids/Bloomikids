<!DOCTYPE html>
<html>
<head><title>BloomiKids - Clear Cache</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body{font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#8B6FE8;color:white;text-align:center;padding:20px;}
  button{background:white;color:#8B6FE8;border:none;padding:16px 32px;border-radius:30px;font-size:1.1rem;font-weight:800;cursor:pointer;margin-top:20px;}
  p{font-size:1rem;opacity:.9;max-width:300px;}
</style>
</head>
<body>
<h1>🌸 BloomiKids</h1>
<p>Tap the button to get the latest version</p>
<button onclick="clearAndReload()">Get Latest Version</button>
<p id="status"></p>
<script>
async function clearAndReload() {
  document.getElementById('status').textContent = 'Clearing cache...';
  try {
    // Unregister all service workers
    const regs = await navigator.serviceWorker.getRegistrations();
    for (const reg of regs) { await reg.unregister(); }
    // Clear all caches
    const keys = await caches.keys();
    for (const key of keys) { await caches.delete(key); }
    document.getElementById('status').textContent = 'Done! Loading fresh version...';
    setTimeout(() => { window.location.href = '/app.html?nocache=' + Date.now(); }, 500);
  } catch(e) {
    document.getElementById('status').textContent = 'Redirecting...';
    window.location.href = '/app.html?nocache=' + Date.now();
  }
}
</script>
</body>
</html>
